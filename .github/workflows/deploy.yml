name: Deploy to GitHub Pages

on:
  # Deploy whenever the primary branch is updated.
  push:
    branches:
      - main
      - master
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Required for the GitHub Pages deployment to publish the built artifact.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; skip queued runs in favor of the latest.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build static site
        # `basePath`/`assetPrefix` come from the Pages base path so assets
        # resolve under https://<user>.github.io/<repo>/.
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
